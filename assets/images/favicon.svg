<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#121212"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="url(#bg-gradient)" stroke="#00ff88" stroke-width="2"/>
  
  <!-- BTM Text -->
  <text x="32" y="42" font-family="Fira Code, monospace" font-size="24" font-weight="bold" text-anchor="middle" fill="#00ff88" filter="url(#glow)">
    BTM
  </text>
  
  <!-- Cyberpunk accents -->
  <rect x="8" y="8" width="4" height="4" fill="#00d4ff"/>
  <rect x="52" y="8" width="4" height="4" fill="#a855f7"/>
  <rect x="8" y="52" width="4" height="4" fill="#a855f7"/>
  <rect x="52" y="52" width="4" height="4" fill="#00d4ff"/>
</svg>
